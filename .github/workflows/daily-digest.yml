name: Dzienna pigułka AI

# Wyzwalacze:
#  - schedule: codzienny bieg (UWAGA: GitHub uruchamia cron TYLKO z galezi domyslnej = main),
#              publikuje na kanal AI_DIGEST.
#  - push na 'production': po kazdym wypchnieciu poprawek publikuje na prywatny kanal.
#  - workflow_dispatch: reczne uruchomienie z wyborem galezi ("Run workflow").
on:
  schedule:
    - cron: "17 7 * * *"
      timezone: "Europe/Warsaw"   # = 7:17 czasu warszawskiego przez cały rok
  push:
    branches:
      - production
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v5

      - name: Ustaw Pythona
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      # Historia wyslanych artykulow (dedup miedzy biegami). Klucz z run_id jest
      # zawsze unikalny -> cache zapisuje sie po kazdym biegu, a restore-keys
      # przywraca najnowszy poprzedni. Osobna historia per galaz (osobne kanaly).
      - name: Przywroc historie wyslanych
        uses: actions/cache@v5
        with:
          path: .state
          key: sent-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sent-history-${{ github.ref_name }}-

      # Zabezpieczenie: na galezi production wymagamy osobnego sekretu,
      # zeby digest z poprawek nigdy nie trafil przypadkiem na AI_DIGEST.
      - name: Sprawdz konfiguracje kanalu (production)
        if: github.ref_name == 'production'
        env:
          PROD_HOOK: ${{ secrets.SLACK_WEBHOOK_URL_PRODUCTION }}
        run: |
          if [ -z "$PROD_HOOK" ]; then
            echo "::error::Brak sekretu SLACK_WEBHOOK_URL_PRODUCTION. Ustaw go w Settings > Secrets and variables > Actions, inaczej digest z production trafilby na AI_DIGEST."
            exit 1
          fi

      - name: Wyslij pigulke
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Na galezi 'production' publikuj na prywatny kanal, w kazdym innym
          # przypadku (main / harmonogram) na AI_DIGEST.
          SLACK_WEBHOOK_URL: ${{ github.ref_name == 'production' && secrets.SLACK_WEBHOOK_URL_PRODUCTION || secrets.SLACK_WEBHOOK_URL }}
          DIGEST_LANGUAGE: "polski"
          LOOKBACK_HOURS: "24"
          OPENAI_MODEL: "gpt-5.5"
          OPENAI_REASONING_EFFORT: "low"
        run: python daily_ai_digest.py
